<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <nav class="navbar">
            <div class="container navbar-flex">
                <div class="navbar-left">
                    <a class="brand-link" href="index.html">
                        <img class="brand-logo" src="logo-std.png" alt="Stationery Shop logo">
                    </a>
                </div>
                <div class="navbar-center">
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="products.html">Products</a></li>
                        <li><a href="categories.html">Categories</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div class="navbar-right">
                    <span class="nav-username">Hi, admin</span>
                    <button class="btn nav-logout-btn">Logout</button>
                </div>
            </div>
        </nav>
    <h1>Add Product</h1>
    <form id="addProductForm">
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea><br>

        <label for="price">Price:</label>
        <input type="number" id="price" name="price" step="0.01" required><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" required><br>

        <button type="submit">Add Product</button>
    </form>
    <div id="message"></div>
    <script>
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                price: parseFloat(document.getElementById('price').value),
                quantity: parseInt(document.getElementById('quantity').value)
            };
            try {
                const response = await fetch('http://localhost:8080/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    document.getElementById('message').textContent = 'Product added successfully!';
                    document.getElementById('addProductForm').reset();
                } else {
                    document.getElementById('message').textContent = 'Failed to add product.';
                }
            } catch (error) {
                document.getElementById('message').textContent = 'Error: ' + error;
            }
        });
    </script>
</body>
</html>
